worker_processes 1;
events { worker_connections 128; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Mapa: token válido → contenido del flag final
    map $http_authorization $vault_ok {
        default                                         0;
        "Bearer tok_h3l1c3_n3gr4_8a3f2c91"              1;
    }

    server {
        listen 80;
        server_name vault-nebula;

        # Landing page pública (cualquier petición desde la red gestion la ve)
        location = / {
            default_type text/html;
            return 200 '<!doctype html><html lang="es"><meta charset="utf-8"><title>NebulaVault</title><body style="font-family:Arial;background:#1a1a2e;color:#eee;padding:40px"><h1>⬢ NebulaVault</h1><p>Almacén interno de secretos de NebulaCorp.</p><p>Endpoint de exportación: <code>/admin/dump</code> (requiere cabecera <code>Authorization: Bearer &lt;token&gt;</code>).</p></body></html>';
        }

        # Endpoint protegido por token de autorización
        location = /admin/dump {
            if ($vault_ok = 0) {
                return 403 '{"error":"forbidden","detail":"missing or invalid bearer token"}\n';
            }
            default_type text/plain;
            return 200 'HELICE{m1ss10n_c0mpl3t3_n3bul4_br34ch3d}\n\n--\nFelicidades: has trazado el camino completo del atacante.\nNebulaCorp ha sido completamente comprometida.\n';
        }

        # Endpoint legacy en desuso. El despliegue antiguo respondía aquí
        # con un identificador estático; se mantiene por compatibilidad con
        # un sistema de monitorización que aún consulta esta ruta.
        location = /admin/legacy {
            default_type text/plain;
            return 200 'HELICE{0bs0l3t3_4dm1n_l3g4cy_3ndp01nt}\n';
        }

        location / { return 404; }
    }
}
